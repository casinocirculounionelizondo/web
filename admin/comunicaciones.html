<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunicaciones — Panel Admin · Casino Círculo de la Unión</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div class="admin-layout">

    <!-- SIDEBAR START -->
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <p class="text-label">Panel Admin</p>
        <p class="admin-brand-name">Casino Círculo de la Unión</p>
      </div>
      <nav class="admin-nav" aria-label="Módulos del panel admin">
        <a href="index.html"          class="admin-nav-link">Dashboard</a>
        <a href="socios.html"         class="admin-nav-link">Socios</a>
        <a href="eventos.html"        class="admin-nav-link">Eventos</a>
        <a href="anuncios.html"       class="admin-nav-link">Anuncios</a>
        <a href="documentos.html"     class="admin-nav-link">Documentos</a>
        <a href="sugerencias.html"    class="admin-nav-link">
          Sugerencias <span id="badge-sugerencias" class="admin-badge" hidden></span>
        </a>
        <a href="comunicaciones.html" class="admin-nav-link">Comunicaciones</a>
      </nav>
      <div class="admin-sidebar-bottom">
        <a href="../socios-privado.html" class="admin-nav-link">← Zona de socios</a>
        <button id="btn-admin-logout" class="btn btn-ghost btn-sm">Cerrar sesión</button>
      </div>
    </aside>
    <!-- SIDEBAR END -->

    <main class="admin-main">
      <header class="admin-page-header">
        <h1 class="text-heading">Comunicaciones</h1>
      </header>
      <div class="admin-content">

        <!-- Formulario de envío -->
        <form id="form-comunicacion" novalidate style="max-width:640px">

          <div class="form-group">
            <label class="form-label" for="campo-destinatarios">Destinatarios</label>
            <select class="form-input" id="campo-destinatarios" required>
              <option value="">— Seleccionar lista —</option>
              <option value="todos">Todos los socios</option>
              <option value="junta">Junta directiva</option>
            </select>
            <p class="text-caption" id="contador-destinatarios" style="margin-top:var(--space-2)"></p>
          </div>

          <div class="form-group">
            <label class="form-label" for="campo-asunto">Asunto</label>
            <input class="form-input" type="text" id="campo-asunto" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="campo-cuerpo">Mensaje</label>
            <textarea class="form-input" id="campo-cuerpo" rows="10" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary" id="btn-enviar">Revisar y enviar</button>

        </form>

        <!-- Pantalla de confirmación (oculta hasta que se pulsa "Revisar") -->
        <div class="comunicaciones-confirmacion" id="confirmacion" style="display:none">
          <p class="comunicaciones-confirmacion-titulo">Confirmar envío</p>
          <p class="comunicaciones-confirmacion-detalle" id="conf-destinatarios"></p>
          <p class="comunicaciones-confirmacion-detalle" id="conf-asunto"></p>
          <p class="comunicaciones-confirmacion-detalle" id="conf-preview"></p>
          <div style="display:flex;gap:var(--space-3);margin-top:var(--space-4)">
            <button class="btn btn-ghost" id="btn-cancelar-envio">Volver al formulario</button>
            <button class="btn btn-primary" id="btn-confirmar-envio">Confirmar y enviar</button>
          </div>
        </div>

        <!-- Progreso de envío -->
        <div id="progreso-envio" style="display:none;max-width:640px;margin-top:var(--space-6)">
          <div class="admin-progress">
            <div class="admin-progress-bar" id="progreso-barra" style="width:0%"></div>
          </div>
          <p class="admin-progress-texto" id="progreso-texto"></p>
        </div>

      </div>
    </main>

  </div>

  <script src="../config.js"></script>
  <!-- resend-config.js no está en el repositorio (ver .gitignore).
       Crear a partir de resend-config.example.js con la API key real. -->
  <script src="resend-config.js"></script>
  <script type="module" src="auth-guard.js"></script>
  <script type="module" src="comunicaciones.js"></script>

</body>
</html>
