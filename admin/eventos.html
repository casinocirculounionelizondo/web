<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos — Panel Admin · Casino Círculo de la Unión</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <div class="admin-layout">

    <!-- SIDEBAR START -->
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <p class="text-label">Panel Admin</p>
        <p class="admin-brand-name">Casino Círculo de la Unión</p>
      </div>
      <nav class="admin-nav" aria-label="Módulos del panel admin">
        <a href="index.html"          class="admin-nav-link">Dashboard</a>
        <a href="socios.html"         class="admin-nav-link">Socios</a>
        <a href="eventos.html"        class="admin-nav-link">Eventos</a>
        <a href="anuncios.html"       class="admin-nav-link">Anuncios</a>
        <a href="documentos.html"     class="admin-nav-link">Documentos</a>
        <a href="sugerencias.html"    class="admin-nav-link">
          Sugerencias <span id="badge-sugerencias" class="admin-badge" hidden></span>
        </a>
        <a href="comunicaciones.html" class="admin-nav-link">Comunicaciones</a>
      </nav>
      <div class="admin-sidebar-bottom">
        <a href="../socios-privado.html" class="admin-nav-link">← Zona de socios</a>
        <button id="btn-admin-logout" class="btn btn-ghost btn-sm">Cerrar sesión</button>
      </div>
    </aside>
    <!-- SIDEBAR END -->

    <main class="admin-main">
      <header class="admin-page-header">
        <h1 class="text-heading">Eventos</h1>
        <button class="btn btn-primary" id="btn-nuevo">Nuevo evento</button>
      </header>
      <div class="admin-content">

        <div class="admin-table-container">
          <table class="admin-table" aria-label="Listado de eventos">
            <thead>
              <tr>
                <th>Título</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Estado</th>
                <th class="col-acciones">Acciones</th>
              </tr>
            </thead>
            <tbody id="eventos-tbody">
              <tr><td colspan="5" class="admin-empty">Cargando…</td></tr>
            </tbody>
          </table>
        </div>

      </div>
    </main>

  </div>

  <!-- Dialog: formulario nuevo/editar evento -->
  <dialog class="admin-dialog" id="dialog-evento" aria-labelledby="dialog-titulo">
    <div class="admin-dialog-header">
      <p class="admin-dialog-titulo" id="dialog-titulo">Nuevo evento</p>
      <button class="admin-dialog-cerrar" id="btn-dialog-cerrar" aria-label="Cerrar">✕</button>
    </div>
    <form class="admin-dialog-body" id="form-evento" novalidate>
      <div class="form-group">
        <label class="form-label" for="campo-titulo">Título</label>
        <input class="form-input" type="text" id="campo-titulo" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="campo-fecha">Fecha</label>
        <input class="form-input" type="date" id="campo-fecha" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="campo-hora">Hora (opcional)</label>
        <input class="form-input" type="time" id="campo-hora">
      </div>
      <div class="form-group">
        <label class="form-label" for="campo-descripcion">Descripción (opcional)</label>
        <textarea class="form-input" id="campo-descripcion" rows="4"></textarea>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:var(--space-2);cursor:pointer;">
          <input type="checkbox" id="campo-activo">
          <span class="form-label" style="margin:0">Activo</span>
        </label>
      </div>
    </form>
    <div class="admin-dialog-footer">
      <button class="btn btn-ghost" id="btn-dialog-cancelar">Cancelar</button>
      <button class="btn btn-primary" id="btn-dialog-guardar">Guardar</button>
    </div>
  </dialog>

  <!-- Dialog: confirmar eliminación -->
  <dialog class="admin-dialog" id="dialog-confirmar" aria-labelledby="confirmar-titulo">
    <div class="admin-dialog-header">
      <p class="admin-dialog-titulo" id="confirmar-titulo">Eliminar evento</p>
      <button class="admin-dialog-cerrar" id="btn-confirmar-cerrar" aria-label="Cerrar">✕</button>
    </div>
    <div class="admin-dialog-body">
      <p class="text-body">¿Eliminar el evento <strong id="confirmar-nombre"></strong>? Esta acción no se puede deshacer.</p>
    </div>
    <div class="admin-dialog-footer">
      <button class="btn btn-ghost" id="btn-confirmar-cancelar">Cancelar</button>
      <button class="btn btn-primary" id="btn-confirmar-eliminar">Eliminar</button>
    </div>
  </dialog>

  <script src="../config.js"></script>
  <script type="module" src="auth-guard.js"></script>
  <script type="module" src="eventos.js"></script>

</body>
</html>
